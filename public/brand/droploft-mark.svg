<?xml version="1.0" encoding="UTF-8"?>
<!--
  Droploft · Favicon · V19 (chassis + symmetric mound, viewBox -50..50)
  ────────────────────────────────────────────────────────────
  16-32 px optimised.  At this size the sphere field is
  suppressed; only the chassis (rounded green square) and the
  artifact mound (cream silhouette) read.

  V19 (2026-05-10) — mound reshaped to symmetric taller profile,
  matches main logo V19 mound (scaled 1.4× to fit chassis).
  Chassis kept forest green for visual continuity / brand recall —
  the favicon is the one surface where forest green still appears
  at full strength (it has to read as the brand even at 16px,
  before any color register is interpretable).

  Coordinate system matches release/logo/logo.svg (viewBox
  -50 -50 100 100, origin centred).

  Layers:
    1. .wm-chassis-shape — rounded square in forest --accent (#1f3c1d)
    2. .wm-core-lg       — V19 artifact mound in --bg cream (#f8f8f5),
                           1.4× scaled from main logo mound,
                           positioned centered in chassis lower-half.
  Both are pre-rotated -2° via the wrapping <g>.

  Iteration history:
    V17.B (2026-05-10) — chassis + cream droplet ellipse.
    V18   (2026-05-10) — droplet → asymmetric mound silhouette.
    V19   (2026-05-10) — asymmetric → symmetric taller mound for
                         clearer readability at favicon size.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -50 100 100" role="img" aria-label="Droploft">
  <g transform="rotate(-2)">
    <path
      d="M-46,-48 C-42,-50 42,-50 46,-48 C49,-45 49,45 46,48 C42,50 -42,50 -46,48 C-49,45 -49,-45 -46,-48 Z"
      fill="#1f3c1d"/>
    <path
      d="M-36,29 C-30,29 -20,24 -10,17 C-4,10 -1,3 0,3 C1,3 4,10 10,17 C20,24 30,29 36,29 Z"
      fill="#f8f8f5"/>
  </g>
</svg>
